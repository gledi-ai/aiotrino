name: release

on:
  push:
    tags:
      - 'v*'

# Trusted Publishing (OIDC) needs id-token: write on the publish jobs;
# the GitHub Release job needs contents: write. Workflow-wide default is
# read-only; jobs elevate as needed.
permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.classify.outputs.kind }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - name: Classify tag
        id: classify
        env:
          # NB: passed via env to avoid GitHub Actions expression injection.
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Stable:     v1.2.3
          # Prerelease: v1.2.3-rc.N | v1.2.3-alpha[.N] | v1.2.3-beta[.N]
          stable_re='^v([0-9]+\.[0-9]+\.[0-9]+)$'
          pre_re='^v([0-9]+\.[0-9]+\.[0-9]+-(rc\.[0-9]+|alpha(\.[0-9]+)?|beta(\.[0-9]+)?))$'
          if [[ "$TAG" =~ $stable_re ]]; then
            echo "kind=stable" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ $pre_re ]]; then
            echo "kind=prerelease" >> "$GITHUB_OUTPUT"
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Tag '$TAG' does not match release pattern" \
                 "(vX.Y.Z, vX.Y.Z-rc.N, vX.Y.Z-alpha[.N], vX.Y.Z-beta[.N])"
            exit 1
          fi

  build:
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # hatch-vcs derives the version from git tags; need full history + tag.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ">=0.11,<0.12"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build sdist + wheel
        run: uv build

      - name: Verify built version matches tag
        env:
          EXPECTED: ${{ needs.classify.outputs.version }}
        run: |
          set -euo pipefail
          # hatch-vcs normalizes per PEP 440 (e.g. 0.4.0-rc.0 -> 0.4.0rc0).
          # Compare via packaging.Version to avoid string-shape mismatches.
          uv run --no-project --with packaging python - "$EXPECTED" <<'PY'
          import sys, pathlib
          from packaging.version import Version
          expected = Version(sys.argv[1])
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          assert wheels, "no wheel produced"
          # aiotrino_patched-<ver>-py3-...whl
          built = Version(wheels[0].name.split("-")[1])
          assert built == expected, f"built {built} != tag {expected}"
          print(f"OK: {built}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    # Runs for every release (stable + prerelease) as a smoke test before PyPI.
    needs: [classify, build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/aiotrino-patched
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

  publish-pypi:
    # Stable tags only; gated behind a successful TestPyPI upload so a broken
    # release (bad metadata, missing files, etc.) never reaches PyPI.
    needs: [classify, build, publish-testpypi]
    if: needs.classify.outputs.kind == 'stable'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aiotrino-patched
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  github-release:
    # Creates the GitHub Release after publishing succeeds.
    # - For stable tags: requires publish-pypi success.
    # - For prereleases: publish-pypi is skipped, so we accept that too.
    needs: [classify, publish-testpypi, publish-pypi]
    if: |
      !cancelled()
      && needs.publish-testpypi.result == 'success'
      && needs.publish-pypi.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ needs.classify.outputs.kind == 'prerelease' }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
